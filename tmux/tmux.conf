# =============================================
# 前缀键
# =============================================

unbind C-b
set -g prefix C-Space
bind C-Space send-prefix


# =============================================
# 基础行为
# =============================================

# 启用鼠标支持
set -g mouse on

# 使用 vi 模式
set-window-option -g mode-keys vi

# 转义时间（解决 vim 中的延迟问题）
set -sg escape-time 0

# 重复键超时时间
set -g repeat-time 1000

# 聚焦事件（供 vim 等使用）
set -g focus-events on

# 多客户端时按需调整窗格大小
setw -g aggressive-resize on

# 允许透传（如图片协议）
set -g allow-passthrough on

# 不修改终端标题
set -g set-titles off


# =============================================
# 窗口 / 窗格编号
# =============================================

# 编号从 1 开始
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1

# 关闭窗口后自动重新编号
set-option -g renumber-windows on


# =============================================
# 终端颜色
# =============================================

set -g default-terminal "tmux-256color"
set-option -a terminal-overrides ",*256col*:RGB"


# =============================================
# 快捷键 — 通用
# =============================================

# 重载配置
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "配置文件已重新加载!"


# =============================================
# 快捷键 — 窗口管理
# =============================================

# 创建新窗口，保持当前目录
bind c new-window -c "#{pane_current_path}"

# 切换窗口（Alt+h/l，方便终端转发）
bind -n M-h previous-window
bind -n M-l next-window

# 监控活动但不弹提示
setw -g monitor-activity on
set -g visual-activity off

# 自动重命名窗口（插件样式块会覆盖，此处保留作为回退）
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'


# =============================================
# 快捷键 — 窗格管理
# =============================================

# 水平 / 垂直分割，保持当前目录
unbind %
bind | split-window -h -c "#{pane_current_path}"

unbind '"'
bind - split-window -v -c "#{pane_current_path}"


# =============================================
# 插件管理 (TPM Redux) — 自举安装
# =============================================

# 若 tpm-redux 不存在则自动克隆
if-shell "test ! -d ~/.config/tmux/plugins/tpm-redux" {
    display "正在安装 tpm-redux..."
    run-shell "git clone https://github.com/RyanMacG/tpm-redux.git ~/.config/tmux/plugins/tpm-redux"
    display "tpm-redux 安装完成，请按 prefix + I 安装插件"
}


# =============================================
# 插件列表
# =============================================

set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'mrjones2014/smart-splits.nvim'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'akohlbecker/aw-watcher-tmux'

# 保留 Alt+h/l 用于切换 window，把 smart-splits 的 resize 移到 Alt+方向键
set -g @smart-splits_resize_left_key 'M-Left'
set -g @smart-splits_resize_down_key 'M-Down'
set -g @smart-splits_resize_up_key 'M-Up'
set -g @smart-splits_resize_right_key 'M-Right'

# 会话保存与恢复
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
# session persistence
set -g @continuum-restore 'off'                # 啟動時自動還原
set -g @continuum-save-interval '1'
set -g @resurrect-capture-pane-contents 'on'   # 保存 pane 可見內容
set -g @resurrect-strategy-nvim 'session'      # 還原 neovim session

# 手动保存 / 恢复快捷键（prefix + S / prefix + R）
bind-key S run-shell '~/.config/tmux/plugins/tmux-resurrect/scripts/save.sh' \; display-message 'tmux 环境已手动保存'
bind-key R run-shell '~/.config/tmux/plugins/tmux-resurrect/scripts/restore.sh' \; display-message 'tmux 环境已手动恢复'

# 主题：Ayu
# set -g @plugin 'catppuccin/tmux'
set -g @plugin 'jakucermak/tmux-ayu'


# =============================================
# 外观 — Ayu 主题配置
# =============================================

# Ayu 插件选项
set -g @ayu_status_background "none"
set -g @ayu_window_status_style "none"
set -g @ayu_pane_status_enabled "off"
set -g @ayu_pane_border_status "off"

# 状态栏全局
set -g status-position top
set -g status-style "bg=#{@thm_bg}"
set -g status-justify "absolute-centre"
set -g status-interval 5

# 状态栏左侧
set -g status-left-length 100
set -g status-left ""
set -ga status-left "#{?client_prefix,#{#[bg=#{@thm_red},fg=#{@thm_bg},bold]  #S },#{#[bg=#{@thm_bg},fg=#{@thm_green}]  #S }}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_ui_line},none]│"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_purple}]  #{pane_current_command} "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_ui_line},none]│"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_blue}]  #{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}} "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_ui_line},none]#{?window_zoomed_flag,│,}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_accent_tint}]#{?window_zoomed_flag,  zoom ,}"

# 状态栏右侧
set -g status-right-length 100
set -g status-right ""
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_blue}] 󰭦 %Y-%m-%d 󰅐 %H:%M "

# 窗格边框
setw -g pane-border-status top
setw -g pane-border-format ""
setw -g pane-border-style "bg=#{@thm_bg},fg=#{@thm_accent_on}"
setw -g pane-border-lines single

# 窗口标签样式
set -wg automatic-rename on
set -g automatic-rename-format "Window"
set -g window-status-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-style "bg=#{@thm_bg},fg=#{@thm_blue}"
set -g window-status-last-style "bg=#{@thm_bg},fg=#{@thm_blue}"
set -g window-status-activity-style "bg=#{@thm_magenta},fg=#{@thm_bg}"
set -g window-status-bell-style "bg=#{@thm_red},fg=#{@thm_bg},bold"
set -gF window-status-separator "#[bg=#{@thm_bg},fg=#{@thm_ui_line}] "
set -g window-status-current-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-current-style "bg=#{@thm_blue},fg=#{@thm_bg},bold"


# =============================================
# 初始化 TPM Redux（务必保持在文件最底部）
# =============================================

run '~/.config/tmux/plugins/tpm-redux/tpm'
