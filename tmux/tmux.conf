# =============================================
# 基础设置
# =============================================

# 修改前缀键为 Ctrl+a（更符合左手习惯）
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# 快捷键前缀后按 r 重新加载配置文件
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "配置文件已重新加载!"

# 启用鼠标支持
set -g mouse on

# 设置终端颜色支持
set -g default-terminal "screen-256color"
set -g terminal-overrides ',xterm-256color:Tc'

# 使用 vi 模式
set -g mode-keys vi

# 设置窗口和窗格编号从 1 开始
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# 设置状态栏更新间隔
set -g status-interval 5

# 设置聚焦事件
set -g focus-events on

# 设置 aggressive resize
setw -g aggressive-resize on

# 设置边框
set -g pane-border-lines simple
set -g pane-border-style fg=black,bright
set -g pane-active-border-style fg=magenta

# =============================================
# 窗口管理
# =============================================

# 使用 | 和 - 分割窗口
unbind %
bind | split-window -h -c "#{pane_current_path}"

unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# 使用前缀 + c 创建新窗口，保持在当前目录
bind c new-window -c "#{pane_current_path}"

# 使用 Alt+方向键在窗格间切换（无需前缀）
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# 使用 Shift+方向键切换窗口（无需前缀）
bind -n S-Left previous-window
bind -n S-Right next-window

# =============================================
# 其他设置
# =============================================

# 自动重命名窗口
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'

# 活动窗口监控
setw -g monitor-activity on
set -g visual-activity off

# 设置转义时间（解决vim中的延迟问题）
set -sg escape-time 0

# 设置重复时间
set -g repeat-time 1000

# =============================================
# 插件管理 (TPM Redux) - 自举安装
# =============================================

# 如果 tpm-redux 不存在，自动克隆安装
if-shell "test ! -d ~/.config/tmux/plugins/tpm-redux" {
    display "正在安装 tpm-redux..."
    run-shell "git clone https://github.com/RyanMacG/tpm-redux.git ~/.config/tmux/plugins/tpm-redux"
    display "tpm-redux 安装完成，请按 prefix + I 安装插件"
}

# 插件列表
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# 初始化 TPM Redux (保持这行在配置文件最底部!)
run '~/.config/tmux/plugins/tpm-redux/tpm'
